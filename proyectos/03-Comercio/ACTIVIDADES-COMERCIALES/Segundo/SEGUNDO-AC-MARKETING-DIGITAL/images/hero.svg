<!-- 
  IMAGEN HERO PARA EL PROYECTO DE COMERCIO
  
  INSTRUCCIONES PARA AÑADIR UNA IMAGEN REAL:
  
  1. Ve a https://www.pexels.com/es-es/
  2. Busca: "online store", "ecommerce", "shopping cart", "tienda online"
  3. Elige una imagen gratuita de calidad
  4. Descárgala en tamaño grande (al menos 1200px de ancho)
  5. Guárdala como "hero.jpg" en esta carpeta images/
  6. Sobrescribe este archivo placeholder
  
  Dimensiones recomendadas: 1200x600 px o similar (formato panorámico)
-->
<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#grad)"/>
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">EcoMarket Valencia</text>
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="36" fill="white" text-anchor="middle">Tienda Online Ecológica</text>
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="24" fill="#fef3c7" text-anchor="middle">FPB Servicios Comerciales</text>
  <text x="600" y="450" font-family="Arial" font-size="20" fill="#fde68a" text-anchor="middle">🛒 Productos Ecológicos y de Proximidad 🌿</text>
  <g transform="translate(550, 480)">
    <text x="0" y="0" font-family="Arial" font-size="80" fill="white" opacity="0.3">🛒</text>
    <text x="60" y="0" font-family="Arial" font-size="80" fill="white" opacity="0.3">🌿</text>
    <text x="120" y="0" font-family="Arial" font-size="80" fill="white" opacity="0.3">📦</text>
  </g>
</svg>
